<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAPCITY RP - By Burlau Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden bg-black">

    <!-- Animated Background -->
    <div class="absolute inset-0 bg-grid opacity-30"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-violet-900/20 via-transparent to-black"></div>
    
    <!-- Floating Particles -->
    <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
    <div class="particle" style="left: 30%; animation-delay: 4s;"></div>
    <div class="particle" style="left: 40%; animation-delay: 6s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 8s;"></div>
    <div class="particle" style="left: 60%; animation-delay: 1s;"></div>
    <div class="particle" style="left: 70%; animation-delay: 3s;"></div>
    <div class="particle" style="left: 80%; animation-delay: 5s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 7s;"></div>

    <!-- Main Container -->
    <div class="relative z-10 w-full max-w-md px-6">
        
        <!-- Logo Section -->
        <div class="text-center mb-8">
            <div class="inline-block p-1 rounded-2xl bg-gradient-to-br from-violet-600 to-violet-400 mb-4 glow-violet">
                <div class="bg-black rounded-xl p-4">
                    <img src="https://cdn.discordapp.com/attachments/1492740367571751004/1492774859913039902/image.png" 
                         alt="TRAPCITY RP Logo" 
                         class="w-24 h-24 object-contain">
                </div>
            </div>
            <h1 class="font-orbitron text-3xl font-bold mb-1">
                TRAPCITY<span class="gradient-text">RP</span>
            </h1>
            <p class="text-gray-400 text-sm">By Burlau Development</p>
        </div>

        <!-- Login Form -->
        <div class="glass rounded-2xl p-8 border border-violet-500/20">
            <h2 class="text-xl font-semibold mb-6 text-center">Iniciar Sesión</h2>
            
            <!-- Discord OAuth Button -->
            <a href="/auth/discord" class="w-full bg-[#5865F2] hover:bg-[#4752C4] text-white font-semibold py-3 rounded-xl flex items-center justify-center gap-2 transition mb-4">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.963.074.074 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.963a.078.078 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                Iniciar con Discord
            </a>

            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-white/10"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-[#0a0a0a] text-gray-500">O continuar con</span>
                </div>
            </div>
            
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Usuario</label>
                    <input type="text" 
                           id="username" 
                           class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-600"
                           placeholder="Tu usuario"
                           required>
                </div>
                
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Contraseña</label>
                    <input type="password" 
                           id="password" 
                           class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-600"
                           placeholder="••••••••"
                           required>
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-gray-400 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 rounded border-gray-600 bg-transparent text-violet-600 focus:ring-violet-500">
                        <span>Recordarme</span>
                    </label>
                    <a href="#" class="text-violet-400 hover:text-violet-300 transition">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" 
                        class="w-full bg-gradient-to-r from-violet-600 to-violet-500 hover:from-violet-500 hover:to-violet-400 text-white font-semibold py-3 rounded-xl transition animate-pulse-glow">
                    Entrar al Panel
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-400 text-sm">
                    ¿No tienes cuenta? 
                    <a href="#" class="text-violet-400 hover:text-violet-300 font-semibold transition">Regístrate</a>
                </p>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-4 mt-8">
            <div class="glass rounded-xl p-4 text-center border border-violet-500/10">
                <div class="text-2xl font-bold text-violet-400" id="onlineCount">-</div>
                <div class="text-xs text-gray-500">Online</div>
            </div>
            <div class="glass rounded-xl p-4 text-center border border-violet-500/10">
                <div class="text-2xl font-bold text-violet-400" id="memberCount">-</div>
                <div class="text-xs text-gray-500">Miembros</div>
            </div>
            <div class="glass rounded-xl p-4 text-center border border-violet-500/10">
                <div class="text-2xl font-bold text-violet-400">24/7</div>
                <div class="text-xs text-gray-500">Activo</div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-center">
            <p class="text-xs text-gray-600">
                © 2026 TRAPCITY RP • Desarrollado por Burlau Development
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
